<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCD Console Proxy — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #388bfd;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 1.1rem;
      color: #f0f6fc;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 1.5rem;
    }

    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid #da3633;
      border-radius: 6px;
      color: #f85149;
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 0.3rem;
    }

    input {
      display: block;
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.9rem;
      padding: 0.45rem 0.75rem;
      margin-bottom: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #388bfd; }

    input::placeholder { color: #484f58; }

    button {
      display: block;
      width: 100%;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.5rem;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }

    button:hover { background: #2ea043; }
    button:active { background: #238636; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PCD Console Proxy</div>
    <h1>Sign in</h1>
    <p class="subtitle">Use your OpenStack credentials</p>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" type="text" name="username"
             value="{{.Username}}" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password"
             autocomplete="current-password" required>

      <label for="project">Project</label>
      <input id="project" type="text" name="project"
             value="{{.Project}}" placeholder="OpenStack project name" required>

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
